<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h2 id="frase"></h2>

    <div id="reloj"></div>
    
    <button id="frases"> Generar </button>

    <script>

        const boton = document.getElementById('frases');

        let titulo = document.getElementById('frase');

        const frases = [ 
            ['Motivación','No cuentes los días, haz que los días cuenten'],
            ['Alegría','La felicidad no es una meta, es el camino'],
            ['Melancolía','La memoria es el único lugar donde podemos volver a vernos'],
            ['Gratitud','Gracias a la vida por todo lo que me da y por lo que me enseña'],
            ['Sabiduría','Saber que no sabes nada es el principio de saber algo']
    ]


        function randonSentence(){
            let indice =  Math.random() * frases.length;
            let indiceFinal =  Math.floor(indice);

            let fraseSeleccionada = frases[indiceFinal]

            let categoria = "Categoria:" + fraseSeleccionada[0]; 
            let fraseFinal = fraseSeleccionada[1];

            return titulo.textContent = categoria+". "+fraseFinal;
            
        }

        const time = document.getElementById('reloj');

        function actualizarReloj(){

            const realTime = new Date();

            let hora = realTime.getHours().toString();
            let minutos = realTime.getMinutes().toString();
            let segundos = realTime.getSeconds().toString();

            hora = hora.padStart(2,'0')
            minutos = minutos.padStart(2,'0')
            segundos = segundos.padStart(2,'0')

            let digital = hora + ':' + minutos + ':' + segundos
            time.textContent = digital

        }

        setInterval(actualizarReloj,1000)
        boton.addEventListener('click',randonSentence);


    </script>
</body>
</html>
